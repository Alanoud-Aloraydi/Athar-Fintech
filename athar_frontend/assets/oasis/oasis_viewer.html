<!DOCTYPE html>
<!--
  Athar Palm Oasis — Spline scene host page (v2).

  Supports TWO commands via postMessage (Flutter Web) or global functions
  (Flutter Native via WebViewController.runJavaScript):

    {cmd: 'updateOasisState', progress: 0.0–1.0, health: 0–100}
      → applyGrowth(progress)  — controls palm visibility (1–9 palms)
      → applyHealth(health)    — applies CSS filter for dryness

    {cmd: 'setVisiblePalmCount', count: N}   ← legacy compat

  Lifecycle events sent to Flutter:
    {event: 'ready'}            — scene loaded, initial state applied.
    {event: 'error', message}   — load failed.
-->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>واحة أثَر</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
    }
    #oasis-canvas {
      width: 100%; height: 100%;
      display: block;
      touch-action: none;
      /* health transition is applied here */
      transition: filter 2s ease-in-out;
    }
    #oasis-loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, "Segoe UI", Tahoma, sans-serif;
      color: #6b7f6b; font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="oasis-loading">جاري تحميل الواحة...</div>
  <canvas id="oasis-canvas"></canvas>

  <script>
    // ── Outbound: send lifecycle events to Flutter ────────────────────
    function postToFlutter(payload) {
      try { window.parent.postMessage(payload, '*'); } catch (_) {}
      try {
        if (window.OasisBridge && window.OasisBridge.postMessage) {
          window.OasisBridge.postMessage(JSON.stringify(payload));
        }
      } catch (_) {}
    }

    // ── Global error fence ────────────────────────────────────────────
    var _errorReported = false;
    function reportError(msg) {
      if (_errorReported) return;
      _errorReported = true;
      var el = document.getElementById('oasis-loading');
      if (el) el.textContent = 'تعذّر تحميل الواحة';
      postToFlutter({ event: 'error', message: String(msg || 'unknown error') });
    }
    window.onerror = function (message, source, lineno, colno, error) {
      reportError(error ? (error.message || message) : message);
      return true;
    };
    window.addEventListener('unhandledrejection', function (ev) {
      var r = ev.reason;
      reportError(r && r.message ? r.message : String(r));
      ev.preventDefault();
    });

    // ── Load-time watchdog ────────────────────────────────────────────
    var _sceneReady = false;
    var _watchdog = setTimeout(function () {
      if (!_sceneReady) reportError('Scene load timed out');
    }, 18000);
  </script>

  <script type="module">
    // Vendored local assets — no CDN or internet required.
    import { Application } from './runtime.js';

    const SCENE_URL   = './scene.splinecode';
    const TOTAL_PALMS = 9;          // palms in the Spline scene (Palm_01 … Palm_09)

    const canvas    = document.getElementById('oasis-canvas');
    const loadingEl = document.getElementById('oasis-loading');
    const spline    = new Application(canvas);

    // ── Helpers ───────────────────────────────────────────────────────

    function findPalm(i) {
      const name = 'Palm_' + String(i).padStart(2, '0');
      let obj = null;
      try { obj = spline.findObjectByName ? spline.findObjectByName(name) : null; } catch (_) {}
      if (!obj) try { obj = spline.getObjectByName ? spline.getObjectByName(name) : null; } catch (_) {}
      return obj;
    }

    /** Shows 1–TOTAL_PALMS palms proportional to goal completion (0.0–1.0). */
    function applyGrowth(progressPct) {
      const pct = Math.max(0.0, Math.min(1.0, progressPct));
      const visibleCount = Math.max(1, Math.min(TOTAL_PALMS,
        1 + Math.floor((pct * 100) / 12.5)
      ));
      for (let i = 1; i <= TOTAL_PALMS; i++) {
        const obj = findPalm(i);
        if (obj) obj.visible = (i <= visibleCount);
      }
    }

    /** Applies a CSS filter to the canvas based on health score (0–100). */
    function applyHealth(healthScore) {
      if (healthScore >= 80) {
        canvas.style.filter = 'none';
      } else if (healthScore >= 50) {
        canvas.style.filter = 'saturate(0.7)';
      } else {
        canvas.style.filter = 'saturate(0.3) sepia(0.35)';
      }
    }

    // Expose to global scope so Flutter Native can call via runJavaScript.
    window.applyGrowth = applyGrowth;
    window.applyHealth = applyHealth;

    /** Combined entry-point used by both postMessage and runJavaScript. */
    window.updateOasisState = function (progress, health) {
      applyGrowth(progress);
      applyHealth(health);
    };

    /** Legacy compat: old setVisiblePalmCount command. */
    window.setVisiblePalmCount = function (count) {
      applyGrowth(count / TOTAL_PALMS);
    };

    // ── Inbound: commands from Flutter Web via postMessage ────────────
    window.addEventListener('message', (e) => {
      try {
        const data = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
        if (!data || !data.cmd) return;
        if (data.cmd === 'updateOasisState') {
          window.updateOasisState(data.progress ?? 0.0, data.health ?? 100);
        } else if (data.cmd === 'setVisiblePalmCount') {
          window.setVisiblePalmCount(data.count ?? 1);
        }
      } catch (_) {}
    });

    // ── Load scene ────────────────────────────────────────────────────
    spline.load(SCENE_URL)
      .then(() => {
        if (loadingEl) loadingEl.style.display = 'none';
        applyGrowth(0.0);          // start with 1 palm
        applyHealth(100);          // start healthy
        _sceneReady = true;
        clearTimeout(_watchdog);
        postToFlutter({ event: 'ready' });
      })
      .catch((err) => {
        reportError(err && err.message ? err.message : String(err));
      });
  </script>
</body>
</html>
