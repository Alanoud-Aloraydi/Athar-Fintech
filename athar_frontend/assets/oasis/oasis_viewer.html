<!DOCTYPE html>
<!--
  Athar Palm Oasis — Spline scene host page.

  Loaded in two ways depending on platform:
    • Flutter Web  → inside an <iframe> via HtmlElementView.
                     Commands arrive via window.addEventListener('message').
                     Events are sent back via window.parent.postMessage.
    • Flutter Native → inside a WebViewWidget.
                     Commands arrive via window.setVisiblePalmCount() (JS eval).
                     Events are sent back via the OasisBridge JS channel.

  Either way, `window.setVisiblePalmCount(n)` works the same: shows
  Palm_01..Palm_0n and hides the rest (all 12 palms live in the scene).

  Lifecycle events posted to Flutter:
    {"event":"ready"}  — scene loaded, initial palm count applied.
    {"event":"error","message":"..."}  — loading failed for any reason
      (network, JS exception, timeout, etc.).
-->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>واحة أثَر</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    #oasis-canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    #oasis-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, "Segoe UI", Tahoma, sans-serif;
      color: #6b7f6b;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="oasis-loading">جاري تحميل الواحة...</div>
  <canvas id="oasis-canvas"></canvas>

  <script>
    // ── Outbound: send lifecycle events to Flutter ────────────────────────
    // Tries both transports; only one will be active at runtime.
    function postToFlutter(payload) {
      // Flutter Web path — iframe parent window
      try { window.parent.postMessage(payload, '*'); } catch (_) {}
      // Flutter Native path — WebView JS channel
      try {
        if (window.OasisBridge && window.OasisBridge.postMessage) {
          window.OasisBridge.postMessage(JSON.stringify(payload));
        }
      } catch (_) {}
    }

    // ── Global error fence ────────────────────────────────────────────────
    // Catches synchronous JS exceptions and unhandled promise rejections
    // that occur inside the module below. Reports them to Flutter so the
    // fallback UI is shown instead of a blank/frozen canvas.
    var _errorReported = false;

    function reportError(msg) {
      if (_errorReported) return;
      _errorReported = true;
      var loadingEl = document.getElementById('oasis-loading');
      if (loadingEl) loadingEl.textContent = 'تعذّر تحميل الواحة';
      postToFlutter({ event: 'error', message: String(msg || 'unknown error') });
    }

    window.onerror = function (message, source, lineno, colno, error) {
      reportError(error ? (error.message || message) : message);
      return true; // prevent default browser error output
    };

    window.addEventListener('unhandledrejection', function (event) {
      var reason = event.reason;
      reportError(reason && reason.message ? reason.message : String(reason));
      event.preventDefault();
    });

    // Load-time watchdog: if the scene hasn't fired "ready" within 18 seconds
    // (slightly less than Flutter's own 20 s timeout so Flutter sees our
    // structured error first), report a timeout error.
    var _sceneReady = false;
    var _watchdog = setTimeout(function () {
      if (!_sceneReady) {
        reportError('Scene load timed out');
      }
    }, 18000);
  </script>

  <script type="module">
    // Both files are bundled as Flutter web assets and served from the same
    // origin — no CDN or internet connection required.
    import { Application } from './runtime.js';

    // Scene exported from Spline, bundled as a local asset.
    const SCENE_URL   = './scene.splinecode';
    const TOTAL_PALMS = 12;

    const canvas    = document.getElementById('oasis-canvas');
    const loadingEl = document.getElementById('oasis-loading');
    const app       = new Application(canvas);

    // ── Palm visibility ───────────────────────────────────────────────────
    function palmName(i) {
      return 'Palm_' + String(i).padStart(2, '0');
    }

    // Exposed to Flutter via WebViewController.runJavaScript (native) or
    // called directly by the postMessage listener (web). Clamps to [1, 12]
    // so a bad value can never hide every palm or reference Palm_13+.
    window.setVisiblePalmCount = function (count) {
      const target = Math.max(1, Math.min(TOTAL_PALMS, Math.round(count)));
      for (let i = 1; i <= TOTAL_PALMS; i++) {
        try {
          const palm = app.getObjectByName(palmName(i));
          if (palm) palm.visible = (i <= target);
        } catch (_) {
          // Individual palm lookup failures are non-fatal.
        }
      }
      return target;
    };

    // ── Inbound: receive commands from Flutter Web via postMessage ────────
    // (Flutter Native drives the scene by calling window.setVisiblePalmCount
    //  directly via WebViewController.runJavaScript — no listener needed.)
    window.addEventListener('message', (e) => {
      try {
        const data = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
        if (data && data.cmd === 'setVisiblePalmCount') {
          window.setVisiblePalmCount(data.count);
        }
      } catch (_) {}
    });

    // ── Load scene ────────────────────────────────────────────────────────
    app
      .load(SCENE_URL)
      .then(() => {
        if (loadingEl) loadingEl.style.display = 'none';
        // Seed palm visible by default; Flutter calls setVisiblePalmCount
        // with the real growth-derived count once Oasis data loads.
        window.setVisiblePalmCount(1);
        window._sceneReady = true;
        clearTimeout(window._watchdog);
        postToFlutter({ event: 'ready' });
      })
      .catch((err) => {
        reportError(err && err.message ? err.message : String(err));
      });
  </script>
</body>
</html>
