<!DOCTYPE html>
<!--
  Athar Palm Oasis — Spline scene host page (v2).

  Supports TWO commands via postMessage (Flutter Web) or global functions
  (Flutter Native via WebViewController.runJavaScript):

    {cmd: 'updateOasisState', progress: 0.0–1.0, health: 0–100}
      → applyGrowth(progress)  — controls palm visibility (1–9 palms)
      → applyHealth(health)    — applies CSS filter for dryness

    {cmd: 'setVisiblePalmCount', count: N}   ← legacy compat

  Lifecycle events sent to Flutter:
    {event: 'ready'}            — scene loaded, initial state applied.
    {event: 'error', message}   — load failed.
-->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>واحة أثَر</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
    }
    /* ── Oasis background (behind the transparent 3D canvas) ──────────── */
    #oasis-bg {
      position: absolute; inset: 0; z-index: 0;
      overflow: hidden;
      transition: filter 2s ease-in-out;
    }
    #sky {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, #8Fc9E6 0%, #BFE3EF 48%, #F3E7C6 100%);
    }
    #sun {
      position: absolute; top: 12%; right: 14%;
      width: 74px; height: 74px; border-radius: 50%;
      background: radial-gradient(circle, #FFE38A 0%, #FFD766 55%, rgba(255,215,102,0) 72%);
    }
    #dunes {
      position: absolute; left: -8%; right: -8%; bottom: 50%; height: 80px;
      background: #E4D2A6;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      opacity: .8;
    }
    #sand {
      position: absolute; left: 0; right: 0; bottom: 0; height: 58%;
      background: linear-gradient(to bottom, #E9D7AC 0%, #D2B888 100%);
      border-radius: 32% 32% 0 0 / 12% 12% 0 0;
    }
    #pond {
      position: absolute; left: 50%; bottom: 7%;
      transform: translateX(-50%);
      width: 44%; height: 58px; border-radius: 50%;
      background: radial-gradient(ellipse at center, #57B4CE 0%, #2E86A8 80%);
      box-shadow: 0 0 0 8px rgba(190,164,111,.55);
    }
    #oasis-canvas {
      position: absolute; inset: 0; z-index: 1;
      width: 100%; height: 100%;
      display: block;
      touch-action: none;
      /* health transition is applied here */
      transition: filter 2s ease-in-out;
    }
    #oasis-loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, "Segoe UI", Tahoma, sans-serif;
      color: #6b7f6b; font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="oasis-bg">
    <div id="sky"></div>
    <div id="sun"></div>
    <div id="dunes"></div>
    <div id="sand"></div>
    <div id="pond"></div>
  </div>
  <div id="oasis-loading">جاري تحميل الواحة...</div>
  <canvas id="oasis-canvas"></canvas>

  <script>
    // ── Outbound: send lifecycle events to Flutter ────────────────────
    function postToFlutter(payload) {
      try { window.parent.postMessage(payload, '*'); } catch (_) {}
      try {
        if (window.OasisBridge && window.OasisBridge.postMessage) {
          window.OasisBridge.postMessage(JSON.stringify(payload));
        }
      } catch (_) {}
    }

    // ── Global error fence ────────────────────────────────────────────
    var _errorReported = false;
    function reportError(msg) {
      if (_errorReported) return;
      _errorReported = true;
      var el = document.getElementById('oasis-loading');
      if (el) el.textContent = 'تعذّر تحميل الواحة';
      postToFlutter({ event: 'error', message: String(msg || 'unknown error') });
    }
    window.onerror = function (message, source, lineno, colno, error) {
      reportError(error ? (error.message || message) : message);
      return true;
    };
    window.addEventListener('unhandledrejection', function (ev) {
      var r = ev.reason;
      reportError(r && r.message ? r.message : String(r));
      ev.preventDefault();
    });

    // ── Load-time watchdog ────────────────────────────────────────────
    var _sceneReady = false;
    var _watchdog = setTimeout(function () {
      if (!_sceneReady) reportError('Scene load timed out');
    }, 18000);
  </script>

  <script type="module">
    // Vendored local assets — no CDN or internet required.
    import { Application } from './runtime.js';

    const SCENE_URL   = './scene.splinecode';

    // Real object names in this scene: a base "Palm tree_03" plus nine
    // "Palm tree_03 Instance[ N]" clones (10 palms total). The previous code
    // looked for "Palm_01"… which never matched, so growth did nothing.
    const PALM_NAMES = ['Palm tree_03', 'Palm tree_03 Instance'];
    for (let i = 2; i <= 9; i++) PALM_NAMES.push('Palm tree_03 Instance ' + i);
    const TOTAL_PALMS = PALM_NAMES.length; // 10

    const canvas    = document.getElementById('oasis-canvas');
    const loadingEl = document.getElementById('oasis-loading');
    const spline    = new Application(canvas);

    // ── Helpers ───────────────────────────────────────────────────────

    function findPalm(idx) {
      const name = PALM_NAMES[idx];
      let obj = null;
      try { obj = spline.findObjectByName ? spline.findObjectByName(name) : null; } catch (_) {}
      if (!obj) try { obj = spline.getObjectByName ? spline.getObjectByName(name) : null; } catch (_) {}
      return obj;
    }

    /** Shows 1–TOTAL_PALMS palms proportional to goal completion (0.0–1.0). */
    function applyGrowth(progressPct) {
      const pct = Math.max(0.0, Math.min(1.0, progressPct));
      const visibleCount = Math.max(1, Math.min(TOTAL_PALMS,
        Math.round(1 + pct * (TOTAL_PALMS - 1))
      ));
      for (let i = 0; i < TOTAL_PALMS; i++) {
        const obj = findPalm(i);
        if (obj) obj.visible = (i < visibleCount);
      }
      if (spline.requestRender) spline.requestRender();
    }

    /** Applies a CSS filter to the whole scene (palms + background) based on
     *  health score (0–100) — smooth, so any value has its own dryness. */
    const bg = document.getElementById('oasis-bg');
    function applyHealth(healthScore) {
      const h = Math.max(0, Math.min(100, healthScore));
      // 100 → vivid; 0 → desaturated + sun-baked sepia.
      const sat = (0.35 + 0.65 * (h / 100)).toFixed(2);
      const sepia = (0.45 * (1 - h / 100)).toFixed(2);
      const bright = (0.85 + 0.15 * (h / 100)).toFixed(2);
      const filter = `saturate(${sat}) sepia(${sepia}) brightness(${bright})`;
      canvas.style.filter = filter;
      if (bg) bg.style.filter = filter;
    }

    // Expose to global scope so Flutter Native can call via runJavaScript.
    window.applyGrowth = applyGrowth;
    window.applyHealth = applyHealth;

    /** Combined entry-point used by both postMessage and runJavaScript. */
    window.updateOasisState = function (progress, health) {
      applyGrowth(progress);
      applyHealth(health);
    };

    /** Legacy compat: old setVisiblePalmCount command. */
    window.setVisiblePalmCount = function (count) {
      applyGrowth(count / TOTAL_PALMS);
    };

    // ── Inbound: commands from Flutter Web via postMessage ────────────
    window.addEventListener('message', (e) => {
      try {
        const data = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
        if (!data || !data.cmd) return;
        if (data.cmd === 'updateOasisState') {
          window.updateOasisState(data.progress ?? 0.0, data.health ?? 100);
        } else if (data.cmd === 'setVisiblePalmCount') {
          window.setVisiblePalmCount(data.count ?? 1);
        }
      } catch (_) {}
    });

    // ── Load scene ────────────────────────────────────────────────────
    spline.load(SCENE_URL)
      .then(() => {
        if (loadingEl) loadingEl.style.display = 'none';
        // Make the WebGL background transparent so the styled oasis backdrop
        // (sky / sun / sand / pond) behind the canvas shows through — without
        // this the scene renders on an opaque dark void.
        try { spline.setBackgroundColor('transparent'); } catch (_) {}
        // Hide the scene's own base platform ("Plane"/"Plane 2") — we render
        // our own styled sand/pond ground, so the built-in slab must go.
        ['Plane', 'Plane 2'].forEach((n) => {
          try { const o = spline.findObjectByName(n); if (o) o.visible = false; } catch (_) {}
        });
        applyGrowth(0.0);          // start with 1 palm
        applyHealth(100);          // start healthy
        _sceneReady = true;
        clearTimeout(_watchdog);
        postToFlutter({ event: 'ready' });
      })
      .catch((err) => {
        reportError(err && err.message ? err.message : String(err));
      });
  </script>
</body>
</html>
