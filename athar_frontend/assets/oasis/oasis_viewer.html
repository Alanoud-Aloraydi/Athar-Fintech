<!DOCTYPE html>
<!--
  Athar Palm Oasis — procedural 3D scene (Three.js, vendored locally).

  Replaces the fixed Spline scene with a fully code-controlled Three.js
  oasis, so palm count, ground, distribution, and states are all driven
  by us: up to 30 palms placed by a phyllotaxis (golden-angle) formula
  around a 3D pond, on a 3D sand ground, under a gradient sky.

  Same command/lifecycle contract as before:
    postMessage {cmd:'updateOasisState', progress:0..1, health:0..100}
      → progress grows the oasis (1 → 30 palms)
      → health withers it (green/lush → brown/dry) + dims the sky
    window.updateOasisState(progress, health)   (native runJavaScript)
  Lifecycle → Flutter: {event:'ready'} once built, {event:'error', message}.
-->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>واحة أثَر</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
    #oasis-canvas { width: 100%; height: 100%; display: block; touch-action: none; }
    #oasis-loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, "Segoe UI", Tahoma, sans-serif; color: #6b7f6b; font-size: 14px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="oasis-loading">جاري تحميل الواحة...</div>
  <canvas id="oasis-canvas"></canvas>

  <script>
    function postToFlutter(payload) {
      try { window.parent.postMessage(payload, '*'); } catch (_) {}
      try { if (window.OasisBridge && window.OasisBridge.postMessage) window.OasisBridge.postMessage(JSON.stringify(payload)); } catch (_) {}
    }
    var _errorReported = false;
    function reportError(msg) {
      if (_errorReported) return; _errorReported = true;
      var el = document.getElementById('oasis-loading'); if (el) el.textContent = 'تعذّر تحميل الواحة';
      postToFlutter({ event: 'error', message: String(msg || 'unknown error') });
    }
    window.onerror = function (m, s, l, c, e) { reportError(e ? (e.message || m) : m); return true; };
    window.addEventListener('unhandledrejection', function (ev) { reportError(ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason)); ev.preventDefault(); });
  </script>

  <script src="./three.min.js"></script>
  <script>
  (function () {
    if (!window.THREE) { reportError('three.js failed to load'); return; }
    var THREE = window.THREE;

    var TOTAL_PALMS = 30;
    var GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5)); // ~137.5°
    var POND_RADIUS = 2.4;

    var canvas = document.getElementById('oasis-canvas');
    var loadingEl = document.getElementById('oasis-loading');

    var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(42, 1, 0.1, 200);

    // ── Sky gradient (as scene background) ────────────────────────────────
    function makeSky(topHex, botHex) {
      var c = document.createElement('canvas'); c.width = 2; c.height = 256;
      var g = c.getContext('2d');
      var grd = g.createLinearGradient(0, 0, 0, 256);
      grd.addColorStop(0, topHex); grd.addColorStop(1, botHex);
      g.fillStyle = grd; g.fillRect(0, 0, 2, 256);
      var t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
    }
    var skyHealthy = makeSky('#6db4dc', '#efe3c2');
    var skyDry = makeSky('#8a8b83', '#c9bd9c');
    scene.background = skyHealthy;

    // ── Lighting ──────────────────────────────────────────────────────────
    var ambient = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambient);
    var sunLight = new THREE.DirectionalLight(0xfff2cc, 0.9);
    sunLight.position.set(14, 20, 8);
    scene.add(sunLight);

    // ── Ground (3D sand) ──────────────────────────────────────────────────
    var groundMat = new THREE.MeshLambertMaterial({ color: 0xe4d2a4 });
    var ground = new THREE.Mesh(new THREE.CircleGeometry(60, 48), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // ── Pond (3D water) ───────────────────────────────────────────────────
    var dampMat = new THREE.MeshLambertMaterial({ color: 0xbfa66f });
    var damp = new THREE.Mesh(new THREE.CircleGeometry(POND_RADIUS + 0.5, 40), dampMat);
    damp.rotation.x = -Math.PI / 2; damp.position.y = 0.01; scene.add(damp);
    var waterMat = new THREE.MeshStandardMaterial({ color: 0x2f9fc4, roughness: 0.25, metalness: 0.35 });
    var water = new THREE.Mesh(new THREE.CircleGeometry(POND_RADIUS, 40), waterMat);
    water.rotation.x = -Math.PI / 2; water.position.y = 0.03; scene.add(water);

    // ── Sun disc ──────────────────────────────────────────────────────────
    var sun = new THREE.Mesh(new THREE.SphereGeometry(2.2, 20, 20),
      new THREE.MeshBasicMaterial({ color: 0xffd766 }));
    sun.position.set(22, 16, -20); scene.add(sun);

    // ── Palm builder ──────────────────────────────────────────────────────
    var TRUNK_COL = 0x8a5a33;
    function buildPalm() {
      var g = new THREE.Group();
      var h = 2.6;
      var trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.24, h, 7),
        new THREE.MeshLambertMaterial({ color: TRUNK_COL })
      );
      trunk.position.y = h / 2; g.add(trunk);

      var crown = new THREE.Group(); crown.position.y = h;
      var frondMat = new THREE.MeshLambertMaterial({ color: 0x2e7d46, side: THREE.DoubleSide });
      g.userData.frondMats = [frondMat];
      // Two layers of fronds form a drooping fountain crown: an inner ring
      // that arcs up-and-out, and an outer ring that droops further down.
      var layers = [
        { count: 9, len: 1.5, tilt: 0.75, y: 0.15 },  // inner, more upright
        { count: 11, len: 1.9, tilt: 1.30, y: 0.0 }   // outer, drooping down
      ];
      for (var L = 0; L < layers.length; L++) {
        var lay = layers[L];
        for (var i = 0; i < lay.count; i++) {
          // Blade geometry extends outward from its base (pivot at the crown).
          var geo = new THREE.PlaneGeometry(0.30, lay.len);
          geo.translate(0, lay.len / 2, 0);            // base at origin, tip at +len
          var blade = new THREE.Mesh(geo, frondMat);
          var ring = new THREE.Group();
          ring.rotation.y = (i / lay.count) * Math.PI * 2 + L * 0.3;
          ring.position.y = lay.y;
          blade.rotation.x = lay.tilt;                 // tilt outward + droop
          ring.add(blade);
          crown.add(ring);
        }
      }
      g.add(crown);
      g.userData.crown = crown;

      // a couple of golden dates
      var dateMat = new THREE.MeshLambertMaterial({ color: 0xc9a227 });
      for (var d = 0; d < 3; d++) {
        var date = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), dateMat);
        date.position.set((d - 1) * 0.12, h - 0.1, 0.1); g.add(date);
      }
      return g;
    }

    // ── Place 30 palms by a phyllotaxis (golden-angle) formula ────────────
    var palms = [];
    for (var i = 0; i < TOTAL_PALMS; i++) {
      var palm = buildPalm();
      var radius = POND_RADIUS + 1.4 + 1.35 * Math.sqrt(i); // spread outward, clear of pond
      var angle = i * GOLDEN_ANGLE;
      palm.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
      var s = 0.9 + 0.25 * ((i * 37) % 10) / 10; // stable size variety
      palm.scale.set(s, s, s);
      palm.rotation.y = (i * 41) % 360 * Math.PI / 180;
      palm.userData.phase = i * 1.3;
      scene.add(palm); palms.push(palm);
    }

    // ── Camera framing ────────────────────────────────────────────────────
    function fitCamera() {
      var w = canvas.clientWidth || 300, hgt = canvas.clientHeight || 300;
      camera.aspect = w / hgt; camera.updateProjectionMatrix();
      renderer.setSize(w, hgt, false);
    }
    camera.position.set(0, 10.5, 20);
    camera.lookAt(0, 1.5, 0);

    // ── State control ─────────────────────────────────────────────────────
    var _visibleCount = 1, _health = 100;
    function applyGrowth(progress) {
      var p = Math.max(0, Math.min(1, progress));
      _visibleCount = Math.max(1, Math.min(TOTAL_PALMS, Math.round(1 + p * (TOTAL_PALMS - 1))));
      for (var i = 0; i < palms.length; i++) palms[i].visible = (i < _visibleCount);
    }
    var _green = new THREE.Color(0x2e7d46), _dry = new THREE.Color(0x9c8438);
    function applyHealth(health) {
      _health = Math.max(0, Math.min(100, health));
      var v = _health / 100;
      // fronds: green (healthy) → olive/brown (withered)
      var col = _dry.clone().lerp(_green, v);
      for (var i = 0; i < palms.length; i++) {
        var mats = palms[i].userData.frondMats; if (mats) mats[0].color.copy(col);
      }
      // water + sky + light dim as health drops
      waterMat.color.setHex(0x6f7d55).lerp(new THREE.Color(0x2f9fc4), v);
      scene.background = v < 0.5 ? skyDry : skyHealthy;
      ambient.intensity = 0.55 + 0.25 * v;
      sunLight.intensity = 0.5 + 0.5 * v;
      sun.visible = v > 0.35;
    }
    window.applyGrowth = applyGrowth;
    window.applyHealth = applyHealth;
    window.updateOasisState = function (progress, health) { applyGrowth(progress); applyHealth(health); };
    window.setVisiblePalmCount = function (count) { applyGrowth(count / TOTAL_PALMS); };

    window.addEventListener('message', function (e) {
      try {
        var data = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
        if (!data || !data.cmd) return;
        if (data.cmd === 'updateOasisState') window.updateOasisState(data.progress != null ? data.progress : 0, data.health != null ? data.health : 100);
        else if (data.cmd === 'setVisiblePalmCount') window.setVisiblePalmCount(data.count != null ? data.count : 1);
      } catch (_) {}
    });

    // ── Animate ───────────────────────────────────────────────────────────
    var clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      var t = clock.getElapsedTime();
      // gentle palm sway
      for (var i = 0; i < palms.length; i++) {
        if (!palms[i].visible) continue;
        var cr = palms[i].userData.crown;
        if (cr) { cr.rotation.z = Math.sin(t * 1.1 + palms[i].userData.phase) * 0.05; }
      }
      // slow camera drift for depth
      camera.position.x = Math.sin(t * 0.12) * 3.0;
      camera.lookAt(0, 1.5, 0);
      // subtle water shimmer
      waterMat.metalness = 0.30 + 0.12 * Math.sin(t * 1.6);
      renderer.render(scene, camera);
    }

    // ── Boot ──────────────────────────────────────────────────────────────
    try {
      fitCamera();
      window.addEventListener('resize', fitCamera);
      applyGrowth(0.0); applyHealth(100);
      animate();
      if (loadingEl) loadingEl.style.display = 'none';
      postToFlutter({ event: 'ready' });
    } catch (err) {
      reportError(err && err.message ? err.message : String(err));
    }
  })();
  </script>
</body>
</html>
