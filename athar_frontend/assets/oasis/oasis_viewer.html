<!DOCTYPE html>
<!--
  Athar Palm Oasis — Spline scene host page.

  Loaded in two ways depending on platform:
    • Flutter Web  → inside an <iframe> via HtmlElementView.
                     Commands arrive via window.addEventListener('message').
                     Events are sent back via window.parent.postMessage.
    • Flutter Native → inside a WebViewWidget.
                     Commands arrive via window.setVisiblePalmCount() (JS eval).
                     Events are sent back via the OasisBridge JS channel.

  Either way, `window.setVisiblePalmCount(n)` works the same: shows
  Palm_01..Palm_0n and hides the rest (all 12 palms live in the scene).
-->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>واحة أثَر</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    #oasis-canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    #oasis-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, "Segoe UI", Tahoma, sans-serif;
      color: #6b7f6b;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="oasis-loading">جاري تحميل الواحة...</div>
  <canvas id="oasis-canvas"></canvas>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.48/build/runtime.js';

    const SCENE_URL  = 'https://prod.spline.design/oa7Ns7PvmCdHvQCP/scene.splinecode';
    const TOTAL_PALMS = 12;

    const canvas    = document.getElementById('oasis-canvas');
    const loadingEl = document.getElementById('oasis-loading');
    const app       = new Application(canvas);

    // ── Outbound: send lifecycle events to Flutter ────────────────────────
    // Tries both transports; only one will be active at runtime.
    function postToFlutter(payload) {
      // Flutter Web path — iframe parent window
      try { window.parent.postMessage(payload, '*'); } catch (_) {}
      // Flutter Native path — WebView JS channel
      try {
        if (window.OasisBridge && window.OasisBridge.postMessage) {
          window.OasisBridge.postMessage(JSON.stringify(payload));
        }
      } catch (_) {}
    }

    // ── Palm visibility ───────────────────────────────────────────────────
    function palmName(i) {
      return 'Palm_' + String(i).padStart(2, '0');
    }

    window.setVisiblePalmCount = function (count) {
      const target = Math.max(1, Math.min(TOTAL_PALMS, Math.round(count)));
      for (let i = 1; i <= TOTAL_PALMS; i++) {
        const palm = app.getObjectByName(palmName(i));
        if (palm) palm.visible = (i <= target);
      }
      return target;
    };

    // ── Inbound: receive commands from Flutter Web via postMessage ────────
    // (Flutter Native drives the scene by calling window.setVisiblePalmCount
    //  directly via WebViewController.runJavaScript — no listener needed.)
    window.addEventListener('message', (e) => {
      try {
        const data = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
        if (data && data.cmd === 'setVisiblePalmCount') {
          window.setVisiblePalmCount(data.count);
        }
      } catch (_) {}
    });

    // ── Load scene ────────────────────────────────────────────────────────
    app
      .load(SCENE_URL)
      .then(() => {
        loadingEl.style.display = 'none';
        window.setVisiblePalmCount(1); // seed palm; Flutter will override
        postToFlutter({ event: 'ready' });
      })
      .catch((err) => {
        loadingEl.textContent = 'تعذّر تحميل الواحة';
        postToFlutter({
          event: 'error',
          message: String(err && err.message ? err.message : err),
        });
      });
  </script>
</body>
</html>
